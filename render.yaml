services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free

    healthCheckPath: /health

    envVars:
      - key: PORT
        value: "10000"

      # Lower RAM usage for Render free tier
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"

      # Auto generate token
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      # Gemini API
      - key: GEMINI_API_KEY
        sync: false

      # Optional AI providers
      - key: OPENAI_API_KEY
        sync: false

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false
