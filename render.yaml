services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free

    healthCheckPath: /

    envVars:
      - key: PORT
        value: "10000"

      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"

      # Use writable temp storage
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw

      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace

      # Gateway token
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      # IMPORTANT FIX
      - key: OPENCLAW_ARGS
        value: "--allow-unconfigured"

      # Gemini API
      - key: GEMINI_API_KEY
        sync: false
