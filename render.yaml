services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: "10000"

      # Reduced memory usage for Render free tier
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"

      # Auto-generated gateway token
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      # AI Provider API Key
      - key: GEMINI_API_KEY
        sync: false

      # Optional providers
      - key: OPENAI_API_KEY
        sync: false

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false

      - key: MOONSHOT_API_KEY
        sync: false

      - key: MINIMAX_API_KEY
        sync: false
